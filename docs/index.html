<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Uno &amp; Pisti</title>

  <!-- PWA: yüklenebilir uygulama (UNO ve Pişti'yi barındıran tek uygulama) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#12203a" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Uno & Pisti" />

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #12203a; color: #fff;
    }
    #app { min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px; padding: 32px 20px; text-align: center; }

    .title { font-weight: 900; font-size: 34px; letter-spacing: 1px; }
    .subtitle { color: #ffffffaa; font-size: 15px; margin-top: 6px; }

    .games { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 340px; }
    .game-card {
      display: flex; align-items: center; gap: 16px; text-decoration: none; color: #fff;
      background: #ffffff14; border: 2px solid #ffffff22; border-radius: 18px;
      padding: 16px 18px; text-align: left; transition: transform .1s ease, background .15s ease;
    }
    .game-card:active { transform: scale(0.97); background: #ffffff22; }
    .game-icon { flex: 0 0 auto; width: 52px; height: 52px; border-radius: 14px; display: block; }
    .game-name { font-weight: 800; font-size: 20px; }
    .game-desc { font-size: 13px; color: #ffffffaa; margin-top: 2px; }
    .game-card.uno { border-color: #c6282866; }
    .game-card.pisti { border-color: #1565c066; }

    .footer { color: #ffffff66; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div>
      <img src="icons/icon-192.png" alt="" style="width:64px;height:64px;border-radius:16px;margin-bottom:10px" />
      <div class="title">Uno &amp; Pisti</div>
      <div class="subtitle">Oynamak istediğin oyunu seç</div>
    </div>

    <div class="games">
      <a class="game-card uno" href="./uno/">
        <img class="game-icon" src="uno/icons/icon-192.png" alt="" />
        <span>
          <div class="game-name">UNO</div>
          <div class="game-desc">2-4 kişilik, oda koduyla online</div>
        </span>
      </a>
      <a class="game-card pisti" href="./pisti/">
        <img class="game-icon" src="pisti/icons/icon-192.png" alt="" />
        <span>
          <div class="game-name">Pişti</div>
          <div class="game-desc">2 ya da 4 kişilik, oda koduyla online</div>
        </span>
      </a>
    </div>

    <div class="footer">Her iki oyun da gerçek zamanlı, oda koduyla oynanır.</div>
  </div>

  <!-- PWA: service worker kaydı (yükleme + çevrimdışı), tüm siteyi kapsar -->
  <script>
    if ("serviceWorker" in navigator) {
      let reloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then((reg) => {
          reg.update();
        }).catch((err) => {
          console.warn("Service worker kaydı başarısız:", err);
        });
      });
    }
  </script>
</body>
</html>

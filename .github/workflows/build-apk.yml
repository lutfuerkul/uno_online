name: Android APK derle

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      # Her derleme benzersiz/artan bir build numarası alır (uygulama içi
      # sürüm kontrolü bunu kullanır, bkz. lib/services/update_check_service.dart).
      - run: flutter build apk --debug --build-number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: uwin-okey-pisti-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      # Yalnızca main'e giden derlemede "en güncel sürüm" işaretçisini
      # günceller — feature branch'teki deneme derlemeleri buna dahil
      # değildir. [skip ci] bu commit'in workflow'u tekrar tetiklemesini
      # (sonsuz döngü) önler.
      - name: Güncel sürümü yayınla (yalnızca main)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          echo "{\"buildNumber\": ${{ github.run_number }}}" > latest_version.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_version.json
          git diff --cached --quiet || git commit -m "Güncel sürüm: build ${{ github.run_number }} [skip ci]"
          git push

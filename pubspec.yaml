name: uno_online
description: "Çok oyunculu (2 kişilik) online UNO mobil oyunu."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase (gerçek zamanlı çok oyunculu) ---
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0

  # --- Durum yönetimi ---
  provider: ^6.1.2

  # --- Benzersiz kimlikler (oyuncu / kart) ---
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

name: uno_online
description: "Çok oyunculu (2 kişilik) online UNO mobil oyunu."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase (gerçek zamanlı çok oyunculu) ---
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0

  # --- Durum yönetimi ---
  provider: ^6.1.2

  # --- Benzersiz kimlikler (oyuncu / kart) ---
  uuid: ^4.5.1

  # --- Oyuncu adı kalıcılığı (web localStorage ile aynı) ---
  shared_preferences: ^2.3.3

  # --- Okey profil fotoğrafı seçimi (galeriden) ---
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: assets/icons/app_icon_source.png
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: assets/icons/app_icon_source.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    # Pişti kart görselleri — web (docs/pisti/) ile ortak dosyalar; iki
    # platformda kartların birebir aynı görünmesi için tek kaynak.
    - docs/pisti/cards/
    # Okey: gerçek taş fotoğrafından kesilmiş taşlar.
    - assets/okey/tiles/
